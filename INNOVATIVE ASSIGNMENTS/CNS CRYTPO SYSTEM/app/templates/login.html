{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="max-w-md mx-auto card p-6 rounded-lg">
  <h2 class="text-xl font-semibold mb-4">Login</h2>
  <form method="post" action="{{ url_for('login') }}" class="space-y-3">
    <label class="block"><span class="text-sm text-gray-300">Email</span>
      <input name="email" type="email" class="mt-1 block w-full rounded bg-gray-800 border border-gray-700 px-3 py-2" required>
    </label>
    <label class="block"><span class="text-sm text-gray-300">Password</span>
      <input name="password" type="password" class="mt-1 block w-full rounded bg-gray-800 border border-gray-700 px-3 py-2" required>
    </label>
    <div class="pt-2">
      <button type="submit" class="px-4 py-2 rounded bg-indigo-600 hover:bg-indigo-500">Login</button>
    </div>
  </form>
  <div class="text-sm text-gray-400 mt-3">No account? <a class="text-indigo-400" href="{{ url_for('register') }}">Register</a></div>
</div>
{% endblock %}
