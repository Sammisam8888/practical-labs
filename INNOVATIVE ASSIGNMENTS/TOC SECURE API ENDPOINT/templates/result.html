
{% extends 'base.html' %}
{% block title %}Result{% endblock %}
{% block content %}
<div class="space-y-6">
  <h1 class="text-2xl font-bold">Automata construction for {{ regex }}</h1>
  <div class="card p-4">
    <h3 class="font-semibold">NFA (textual)</h3>
    <pre>{{ nfa_dot }}</pre>
  </div>
  <div class="card p-4">
    <h3 class="font-semibold">DFA (subset construction)</h3>
    <pre>{{ dfa_dot }}</pre>
  </div>
  <div class="card p-4">
    <h3 class="font-semibold">Minimized DFA</h3>
    <pre>{{ min_dot }}</pre>
  </div>
  <div><a href="/" class="px-3 py-2 bg-gray-700 rounded">Back</a></div>
</div>
{% endblock %}
