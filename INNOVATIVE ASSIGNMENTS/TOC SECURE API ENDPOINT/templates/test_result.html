
{% extends 'base.html' %}
{% block title %}Test result{% endblock %}
{% block content %}
<div class="space-y-6">
  <h1 class="text-2xl font-bold">Test Result</h1>
  <div class="card p-4">
    <div><b>Automaton:</b> {{ automaton }}</div>
    <div><b>Expression:</b> {{ expr }}</div>
    <div><b>Input String:</b> {{ string }}</div>
    <div class="mt-2"><b>Accepted:</b> {{ 'Yes' if accepted else 'No' }}</div>
  </div>
  <div><a href="/" class="px-3 py-2 bg-gray-700 rounded">Back</a></div>
</div>
{% endblock %}
